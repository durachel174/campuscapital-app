databases:
  - name: campuscapital-db
    databaseName: campuscapital
    user: campuscapital
    plan: free

services:
  - type: web
    name: campuscapital-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/startup.py && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campuscapital-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
